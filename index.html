<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinxOS / DM8 命令训练</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:#0f0f1a;color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column}
/* 顶栏 */
.topbar{background:#1a1a2e;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #2a2a4a}
.topbar h1{font-size:16px;color:#7c83fd;font-weight:700;letter-spacing:.5px}
.stats{display:flex;gap:16px;font-size:13px}
.stat{text-align:center}
.stat-val{font-size:20px;font-weight:700}
.stat-val.green{color:#4caf50}
.stat-val.red{color:#ef5350}
.stat-val.blue{color:#7c83fd}
.stat-label{font-size:10px;color:#888;margin-top:2px}
/* 学科 tab */
.subject-bar{background:#1a1a2e;border-bottom:1px solid #2a2a4a}
.subject-tabs{display:flex;gap:0;max-width:600px;margin:0 auto}
.subject-tab{flex:1;padding:12px 16px;border:none;background:transparent;color:#888;font-size:14px;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;font-family:inherit}
.subject-tab.active{color:#7c83fd;border-bottom-color:#7c83fd;font-weight:600;background:#0f0f1a}
.subject-tab:hover:not(.active){color:#bbb;background:#1f1f3a}
/* 进度条 */
.prog-wrap{height:3px;background:#1a1a2e}
.prog-bar{height:100%;background:linear-gradient(90deg,#7c83fd,#4caf50);transition:width .4s}
/* 主区域 */
.main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px 200px}
/* 卡片 */
.card{width:100%;max-width:600px}
.category-badge{display:inline-block;background:#2a2a4a;color:#7c83fd;font-size:11px;padding:3px 10px;border-radius:12px;margin-bottom:12px;font-weight:600;letter-spacing:.5px}
.weak-badge{display:inline-block;background:#3a1a1a;color:#ef9a9a;font-size:10px;padding:2px 8px;border-radius:10px;margin-left:6px;font-weight:600}
.prompt{font-size:22px;font-weight:600;color:#fff;line-height:1.5;margin-bottom:8px;min-height:64px}
.hint{font-size:13px;color:#888;margin-bottom:24px;min-height:18px}
/* 输入区 */
.input-wrap{position:relative;margin-bottom:16px}
.cmd-input{width:100%;background:#1a1a2e;border:2px solid #2a2a4a;border-radius:10px;padding:14px 16px;font-size:18px;font-family:"SF Mono","Consolas",monospace;color:#a5d6a7;outline:none;transition:border-color .2s;caret-color:#7c83fd}
.cmd-input:focus{border-color:#7c83fd}
.cmd-input.correct{border-color:#4caf50;background:#0d2010}
.cmd-input.wrong{border-color:#ef5350;background:#1a0a0a;animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
/* 反馈 */
.feedback{min-height:56px;margin-bottom:20px;border-radius:8px;padding:12px 16px;font-size:14px;display:none}
.feedback.show{display:block}
.feedback.ok{background:#0d2010;border:1px solid #4caf50;color:#a5d6a7}
.feedback.bad{background:#1a0a0a;border:1px solid #ef5350;color:#ef9a9a}
.feedback .correct-answer{font-family:monospace;font-size:16px;color:#fff;margin-top:4px}
.feedback .explain{font-size:13px;color:#aaa;margin-top:6px}
/* 按钮（移至固定操作栏，保留原类名供 JS 使用） */
.action-bar{position:fixed;bottom:0;left:0;right:0;z-index:200;background:#0f0f1a;border-top:1px solid #2a2a4a;padding:10px 16px 10px}
.btns{display:flex;gap:10px;max-width:600px;margin:0 auto}
.btn{flex:1;padding:0;height:52px;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.btn-check{background:#7c83fd;color:#fff}
.btn-check:active{background:#5c63cd}
.btn-skip{background:#2a2a4a;color:#aaa}
.btn-skip:active{background:#3a3a5a}
.btn-next{background:#4caf50;color:#fff;display:none}
.btn-next:active{background:#388e3c}
/* 快捷提示 */
.shortcut{display:none}
/* 筛选栏（嵌入 action-bar 内） */
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;padding:8px 16px 0;max-width:600px;margin:0 auto;max-height:80px;overflow-y:auto}
.filter-btn{padding:5px 12px;border:1px solid #2a2a4a;border-radius:20px;font-size:12px;cursor:pointer;background:transparent;color:#888;transition:all .15s;white-space:nowrap;font-family:inherit}
.filter-btn.active{background:#7c83fd;border-color:#7c83fd;color:#fff;font-weight:600}
.filter-btn.weak{border-color:#ef5350;color:#ef9a9a}
.filter-btn.weak.active{background:#ef5350;border-color:#ef5350;color:#fff}
/* 结束页 */
.end-screen{display:none;text-align:center;padding:40px 20px}
.end-screen h2{font-size:36px;font-weight:700;color:#7c83fd;margin-bottom:8px}
.end-screen p{color:#888;margin-bottom:24px;font-size:15px}
.end-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:360px;margin:0 auto 32px}
.end-stat{background:#1a1a2e;border-radius:10px;padding:16px 8px;border:1px solid #2a2a4a}
.end-stat-val{font-size:28px;font-weight:700}
.end-stat-lab{font-size:11px;color:#888;margin-top:4px}
.btn-restart{background:#7c83fd;color:#fff;padding:12px 40px;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer}
/* 错题回顾 */
.review-list{max-width:600px;width:100%;margin:0 auto;text-align:left}
.review-item{background:#1a1a2e;border-radius:8px;padding:14px 16px;margin-bottom:10px;border-left:3px solid #ef5350}
.review-q{font-size:14px;color:#aaa;margin-bottom:6px}
.review-a{font-family:monospace;font-size:15px;color:#a5d6a7}
</style>
</head>
<body>

<div class="topbar">
  <h1>⚡ 命令训练</h1>
  <div class="stats">
    <div class="stat"><div class="stat-val green" id="sCorrect">0</div><div class="stat-label">正确</div></div>
    <div class="stat"><div class="stat-val red" id="sWrong">0</div><div class="stat-label">错误</div></div>
    <div class="stat"><div class="stat-val blue" id="sLeft">0</div><div class="stat-label">剩余</div></div>
  </div>
</div>

<div class="subject-bar">
  <div class="subject-tabs" id="subjectTabs">
    <!-- 学科 tab 由 JS 动态生成 -->
  </div>
</div>

<div class="prog-wrap"><div class="prog-bar" id="progBar" style="width:0%"></div></div>

<div class="main" id="mainView">
  <div class="card">
    <div>
      <span class="category-badge" id="catBadge">加载中</span>
      <span class="weak-badge" id="weakBadge" style="display:none">薄弱 ×N</span>
    </div>
    <div class="prompt" id="prompt">正在加载题目...</div>
    <div class="hint" id="hintText"></div>

    <div class="input-wrap">
      <input type="text" class="cmd-input" id="cmdInput" placeholder="输入命令或答案，回车确认" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
    </div>

    <div class="feedback" id="feedback">
      <div id="feedbackMsg"></div>
      <div class="correct-answer" id="correctAnswer"></div>
      <div class="explain" id="explainText"></div>
    </div>

  </div>
</div>

<div class="end-screen" id="endView">
  <h2 id="endEmoji">🎉</h2>
  <p id="endTitle">本轮训练完成</p>
  <div class="end-grid">
    <div class="end-stat"><div class="end-stat-val green" id="eCorrect">0</div><div class="end-stat-lab">答对</div></div>
    <div class="end-stat"><div class="end-stat-val red" id="eWrong">0</div><div class="end-stat-lab">答错/跳过</div></div>
    <div class="end-stat"><div class="end-stat-val blue" id="eRate">0%</div><div class="end-stat-lab">正确率</div></div>
  </div>
  <button class="btn-restart" onclick="restart()">再练一遍</button>
  <div style="margin-top:32px">
    <h3 style="color:#ef5350;margin-bottom:12px;font-size:14px">❌ 错题回顾</h3>
    <div class="review-list" id="reviewList"></div>
  </div>
</div>

<div class="action-bar">
  <div class="btns">
    <button class="btn btn-skip" id="btnSkip" onclick="skipQ()">跳过</button>
    <button class="btn btn-check" id="btnCheck" onclick="checkAnswer()">确认 ↵</button>
    <button class="btn btn-next" id="btnNext" onclick="nextQ()">下一题 →</button>
  </div>
  <div class="filter-bar" id="filterBar">
    <!-- 筛选按钮由 JS 动态生成 -->
  </div>
</div>

<script>
let BANK = [];
let SUBJECTS = [];
let curSubject = null;

// ============================================================
// 运行时状态
// ============================================================
let queue = [], cur = 0, correct = 0, wrong = 0, wrongItems = [];
let answered = false, curCat = 'all';

function shuffle(arr){ for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }

function buildQueue(){
  let items;
  if (curCat === 'all') {
    items = BANK;
  } else if (curCat === '__weak__') {
    items = BANK.filter(x => (x.weak_count || 0) > 0);
    // 薄弱题按 weak_count 降序排，最薄弱的优先
    items = [...items].sort((a, b) => (b.weak_count || 0) - (a.weak_count || 0));
    queue = items;  // 不打乱顺序
    cur = 0; correct = 0; wrong = 0; wrongItems = [];
    answered = false;
    return;
  } else {
    items = BANK.filter(x => x.cat === curCat);
  }
  queue = shuffle([...items]);
  cur = 0; correct = 0; wrong = 0; wrongItems = [];
  answered = false;
}

function updateStats(){
  document.getElementById('sCorrect').textContent = correct;
  document.getElementById('sWrong').textContent = wrong;
  document.getElementById('sLeft').textContent = Math.max(0, queue.length - cur);
  const pct = queue.length ? (cur / queue.length * 100) : 0;
  document.getElementById('progBar').style.width = pct + '%';
}

function showQ(){
  if(cur >= queue.length){ showEnd(); return; }
  const item = queue[cur];
  answered = false;
  document.getElementById('catBadge').textContent = item.cat;
  // 薄弱徽章
  const weakBadge = document.getElementById('weakBadge');
  if ((item.weak_count || 0) > 0) {
    weakBadge.style.display = 'inline-block';
    weakBadge.textContent = '薄弱 ×' + item.weak_count;
  } else {
    weakBadge.style.display = 'none';
  }
  document.getElementById('prompt').textContent = item.q;
  document.getElementById('hintText').textContent = item.hint ? '提示：' + item.hint : '';
  const inp = document.getElementById('cmdInput');
  inp.value = ''; inp.className = 'cmd-input'; inp.disabled = false; inp.focus();
  const fb = document.getElementById('feedback');
  fb.className = 'feedback'; fb.style.display = 'none';
  document.getElementById('btnCheck').style.display = '';
  document.getElementById('btnSkip').style.display = '';
  document.getElementById('btnNext').style.display = 'none';
  updateStats();
}

function normalize(s){ return s.trim().replace(/\s+/g,' ').toLowerCase(); }

function checkAnswer(){
  if(answered) return nextQ();
  const item = queue[cur];
  const val = document.getElementById('cmdInput').value;
  const n = normalize(val);
  const ok = item.a.some(a => normalize(a) === n);
  const inp = document.getElementById('cmdInput');
  const fb = document.getElementById('feedback');
  answered = true;
  inp.disabled = true;
  fb.style.display = 'block';
  if(ok){
    correct++;
    inp.className = 'cmd-input correct';
    fb.className = 'feedback show ok';
    document.getElementById('feedbackMsg').textContent = '✅ 正确！';
    document.getElementById('correctAnswer').textContent = '';
    document.getElementById('explainText').textContent = item.explain || '';
  } else {
    wrong++;
    wrongItems.push(item);
    inp.className = 'cmd-input wrong';
    fb.className = 'feedback show bad';
    document.getElementById('feedbackMsg').textContent = '❌ ' + (val.trim() ? '答错了' : '未作答');
    document.getElementById('correctAnswer').textContent = '正确答案：' + item.a[0];
    document.getElementById('explainText').textContent = item.explain || '';
  }
  document.getElementById('btnCheck').style.display = 'none';
  document.getElementById('btnSkip').style.display = 'none';
  document.getElementById('btnNext').style.display = '';
  updateStats();
}

function skipQ(){
  wrong++;
  wrongItems.push(queue[cur]);
  cur++;
  updateStats();
  showQ();
}

function nextQ(){
  cur++;
  showQ();
}

function showEnd(){
  document.getElementById('mainView').style.display = 'none';
  document.getElementById('endView').style.display = 'block';
  const total = correct + wrong;
  const rate = total ? Math.round(correct/total*100) : 0;
  document.getElementById('eCorrect').textContent = correct;
  document.getElementById('eWrong').textContent = wrong;
  document.getElementById('eRate').textContent = rate + '%';
  document.getElementById('endEmoji').textContent = rate >= 90 ? '🔥' : rate >= 70 ? '💪' : '📖';
  document.getElementById('endTitle').textContent = rate >= 90 ? '牛！命令已刻入肌肉记忆' : rate >= 70 ? '不错，继续巩固' : '加油，多练几遍！';
  const rl = document.getElementById('reviewList');
  rl.innerHTML = wrongItems.length === 0 ? '<p style="color:#4caf50;text-align:center">全部答对，无错题！</p>' :
    wrongItems.map(x=>`<div class="review-item"><div class="review-q">${x.q}</div><div class="review-a">${x.a[0]}</div></div>`).join('');
}

function restart(){
  document.getElementById('mainView').style.display = '';
  document.getElementById('endView').style.display = 'none';
  buildQueue(); showQ();
}

function setFilter(btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  curCat = btn.dataset.cat;
  restart();
}

// 学科切换
function setSubject(btn) {
  document.querySelectorAll('.subject-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  loadSubject(btn.dataset.sub, btn.dataset.file);
}

async function loadSubject(subjectId, file) {
  try {
    const data = await fetch(file + '?t=' + Date.now()).then(r => r.json());
    BANK = data;
    curSubject = subjectId;
    renderCatButtons();
    curCat = 'all';
    document.getElementById('mainView').style.display = '';
    document.getElementById('endView').style.display = 'none';
    buildQueue();
    showQ();
  } catch(e) {
    document.getElementById('prompt').textContent = '题库加载失败：' + e.message;
  }
}

function renderSubjectTabs(subjects) {
  const container = document.getElementById('subjectTabs');
  container.innerHTML = subjects.map((s, i) =>
    `<button class="subject-tab ${i===0?'active':''}" data-sub="${s.id}" data-file="${s.file}" onclick="setSubject(this)">${s.name}</button>`
  ).join('');
}

function renderCatButtons() {
  // 统计 cat 出现次数
  const catCounts = {};
  let weakCount = 0;
  BANK.forEach(q => {
    catCounts[q.cat] = (catCounts[q.cat] || 0) + 1;
    if ((q.weak_count || 0) > 0) weakCount++;
  });
  // 按数量降序排
  const cats = Object.keys(catCounts).sort((a, b) => catCounts[b] - catCounts[a]);
  const container = document.getElementById('filterBar');
  let html = `<button class="filter-btn active" data-cat="all" onclick="setFilter(this)">全部 (${BANK.length})</button>`;
  if (weakCount > 0) {
    html += `<button class="filter-btn weak" data-cat="__weak__" onclick="setFilter(this)">⚠ 薄弱 (${weakCount})</button>`;
  }
  html += cats.map(c => `<button class="filter-btn" data-cat="${c}" onclick="setFilter(this)">${c} (${catCounts[c]})</button>`).join('');
  container.innerHTML = html;
}

// 键盘快捷键
document.getElementById('cmdInput').addEventListener('keydown', e => {
  if(e.key === 'Enter'){ e.preventDefault(); answered ? nextQ() : checkAnswer(); }
  if(e.key === 'Escape'){ e.preventDefault(); skipQ(); }
});

// 启动：从 manifest.json 读学科清单 → 默认加载第一个学科
async function init() {
  try {
    const meta = await fetch('manifest.json?t=' + Date.now()).then(r => r.json());
    SUBJECTS = meta.subjects;
    renderSubjectTabs(SUBJECTS);
    if (SUBJECTS.length > 0) {
      await loadSubject(SUBJECTS[0].id, SUBJECTS[0].file);
    }
  } catch(e) {
    document.getElementById('prompt').textContent = 'manifest.json 加载失败：' + e.message;
  }
}

init();
</script>
</body>
</html>
